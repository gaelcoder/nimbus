server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/nimbus
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: 86400000


