server:
  port: 8082

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/nimbus
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

aws:
  region: us-east-2

  sqs:
    transaction-queue-url: ${SQS_TRANSACTION_QUEUE_URL}
