version: "3.9"

services:

  postgres:
    image: postgres:16

    container_name: nimbus-postgres

    environment:
      POSTGRES_DB: nimbus
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

  auth-service:
    build:
      context: ../../auth-service
      dockerfile: ../infrastructure/docker/auth-service/Dockerfile

    ports:
      - "8081:8081"

    depends_on:
      - postgres

  account-service:
    build:
      context: ../../account-service
      dockerfile: ../infrastructure/docker/account-service/Dockerfile

    ports:
      - "8082:8082"

    depends_on:
      - postgres

  transaction-service:
    build:
      context: ../../transaction-service
      dockerfile: ../infrastructure/docker/transaction-service/Dockerfile

    ports:
      - "8083:8083"

    depends_on:
      - postgres

  notification-service:
    build:
      context: ../../notification-service
      dockerfile: ../infrastructure/docker/notification-service/Dockerfile

    ports:
      - "8084:8084"

    depends_on:
      - postgres