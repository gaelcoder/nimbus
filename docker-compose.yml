version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: nimbus-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nimbus
    ports:
      - "5432:5432"

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres

  account-service:
    build: ./account-service
    ports:
      - "8082:8082"
    depends_on:
      - postgres

  transaction-service:
    build: ./transaction-service
    ports:
      - "8083:8083"
    depends_on:
      - postgres

  notification-service:
    build: ./notification-service
    ports:
      - "8084:8084"
    depends_on:
      - postgres